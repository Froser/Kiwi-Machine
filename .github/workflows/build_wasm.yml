name: Build WebAssembly

on:
  push:
    branches: [ 'main' ]
  pull_request:
    branches: [ 'main' ]
  workflow_dispatch:

jobs:
  build:
    name: Build on WebAssembly
    runs-on: macos-14

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      uses: lukka/get-cmake@latest

    - name: Sync workspace dependencies
      run: |
        python build.py workspace

    - name: Build WebAssembly platform (Debug and Release)
      run: |
        python build.py wasm --build

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: kiwi-machine-wasm
        path: |
          cmake-build-emscripten-debug/
          cmake-build-emscripten-release/
        retention-days: 30
