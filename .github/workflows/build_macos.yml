name: Build macOS

on:
  push:
    branches: [ 'main' ]
  pull_request:
    branches: [ 'main' ]
  workflow_dispatch:

jobs:
  build:
    name: Build on macOS (Apple Silicon)
    runs-on: macos-14

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies (macOS)
      run: |
        brew install cmake ninja

    - name: Sync workspace dependencies
      run: |
        python build.py workspace

    - name: Build PC platform (Debug and Release)
      run: |
        python build.py pc --build

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: kiwi-machine-macos-apple
        path: |
          cmake-build-debug/
          cmake-build-release/
        retention-days: 30
